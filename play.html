<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordQuest — Play</title>
<style>
  :root{
    --grass:#3dbb6a;--grass-d:#2a9450;--sky:#5b8def;--violet:#8b5cf6;--coral:#ff6b6b;
    --sun:#f0a818;--sun-d:#c9870b;--ink:#2c3142;--muted:#8a90a2;--line:#e7ebf2;
    --shadow:0 6px 20px rgba(40,50,80,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito','Segoe UI',system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#cdeafe 0%,#d8f5e3 100%);min-height:100vh}
  .stage{max-width:560px;margin:0 auto;padding:18px;min-height:100vh;display:flex;flex-direction:column}
  .card{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px}
  h1{font-family:'Fredoka','Nunito',sans-serif;font-size:30px;text-align:center;margin-bottom:4px}
  h1 span{color:var(--grass)}
  .sub{text-align:center;color:var(--muted);margin-bottom:18px}
  input,select{font:inherit;font-weight:700;border:3px solid var(--line);border-radius:14px;padding:12px 14px;width:100%;text-align:center}
  input:focus,select:focus{outline:none;border-color:var(--sky)}
  .code-in{font-size:30px;letter-spacing:8px;text-transform:uppercase}
  .btn{font:inherit;font-weight:800;border:none;border-radius:16px;padding:14px;width:100%;cursor:pointer;color:#fff;
    background:var(--grass);font-size:17px;box-shadow:0 4px 0 var(--grass-d);transition:.1s}
  .btn:active{transform:translateY(3px);box-shadow:none}
  .btn.sky{background:var(--sky);box-shadow:0 4px 0 #3a6fd0}
  .btn.coral{background:var(--coral);box-shadow:0 4px 0 #d84f4f}
  .btn.ghost{background:#eef1f7;color:var(--ink);box-shadow:0 4px 0 #d4dae6}
  label{font-weight:800;display:block;margin:12px 0 5px;font-size:14px}
  .muted{color:var(--muted)}.hide{display:none}
  .opt{display:flex;align-items:center;gap:12px;background:#f5f7fb;border:3px solid transparent;border-radius:16px;
    padding:14px;margin:8px 0;cursor:pointer;font-weight:700;font-size:16px;transition:.1s}
  .opt:hover{border-color:var(--sky)}
  .opt .key{width:34px;height:34px;border-radius:10px;background:#fff;display:grid;place-items:center;font-weight:800;box-shadow:var(--shadow)}
  .opt.correct{background:#e9f9ef;border-color:var(--grass)}.opt.wrong{background:#fdeeee;border-color:var(--coral)}
  .fill-in{font-weight:800;font-size:20px;border:none;border-bottom:3px dashed var(--sky);background:#eef4ff;
    padding:8px 12px;text-align:center;border-radius:10px 10px 0 0}
  .cloze-blank{font-weight:800;font-size:18px;border:none;border-bottom:3px dashed var(--sky);background:#eef4ff;
    padding:5px 8px;min-width:90px;text-align:center;border-radius:8px 8px 0 0;margin:0 3px}
  .cloze-blank.correct{border-color:var(--grass);background:#e9f9ef}.cloze-blank.wrong{border-color:var(--coral);background:#fdeeee}
  .passage{background:#f5f7fb;border-radius:14px;padding:16px;line-height:1.8;margin:12px 0}
  .ta{width:100%;border:3px solid var(--line);border-radius:14px;padding:12px;font:inherit;font-weight:600;text-align:left}
  .qtext{font-size:19px;font-weight:800;margin:8px 0 14px;text-align:center}
  .topbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:16px;
    padding:10px 16px;box-shadow:var(--shadow);margin-bottom:14px;font-weight:800}
  .chip{background:#f5f7fb;border-radius:12px;padding:5px 12px;font-size:14px}
  .feedback{border-radius:14px;padding:12px 14px;margin-top:12px;font-weight:700}
  .feedback.good{background:#e9f9ef;color:var(--grass-d)}.feedback.info{background:#eef4ff;color:#3a6fd0}
  .lb{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;margin:5px 0;background:#f5f7fb;font-weight:700}
  .lb.me{background:#fff7e6;border:2px solid var(--sun)}
  .lb .av{width:30px;height:30px;border-radius:50%;background:var(--violet);color:#fff;display:grid;place-items:center;font-size:14px}
  .bot .av{background:var(--muted)}
  .name-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-height:280px;overflow:auto;margin-top:8px}
  .name-btn{background:#f5f7fb;border:3px solid transparent;border-radius:12px;padding:12px;font-weight:800;cursor:pointer}
  .name-btn:hover{border-color:var(--sky)}
  .center{text-align:center}
</style>
</head>
<body>
<div class="stage">

  <!-- JOIN -->
  <div id="join">
    <h1>Word<span>Quest</span></h1>
    <div class="sub">Enter your class game code</div>
    <div class="card">
      <input id="code" class="code-in" maxlength="5" placeholder="ABCDE" autocomplete="off">
      <div style="height:12px"></div>
      <button class="btn" onclick="lookup()">Join Game →</button>
      <div id="join-msg" class="muted center" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- PICK CLASS + NAME -->
  <div id="pick" class="hide">
    <h1 id="pick-title">Who are you?</h1>
    <div class="sub" id="pick-sub"></div>
    <div class="card">
      <label>Choose your class</label>
      <select id="class-sel" onchange="loadNames()"></select>
      <div id="names-wrap" class="hide">
        <label>Tap your name</label>
        <div id="name-grid" class="name-grid"></div>
      </div>
      <div id="guest-wrap" class="hide">
        <label>Type your name</label>
        <input id="guest-name" placeholder="Your name">
        <div style="height:12px"></div>
        <button class="btn sky" onclick="startGuest()">Start →</button>
      </div>
    </div>
  </div>

  <!-- PLAY -->
  <div id="play" class="hide">
    <div class="topbar">
      <span class="chip" id="prog">1/5</span>
      <span id="player-name">You</span>
      <span class="chip" id="pts">0 pts</span>
    </div>
    <div class="card" id="qcard"></div>
    <div id="actions"></div>
    <!-- mini live leaderboard -->
    <div class="card">
      <div style="font-weight:800;margin-bottom:6px">📡 Live</div>
      <div id="mini-lb"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result" class="hide">
    <div class="card center">
      <div style="font-size:60px" id="res-emoji">🎉</div>
      <h1 id="res-title">Great job!</h1>
      <div class="qtext" id="res-score"></div>
      <div id="res-lb" style="margin:14px 0"></div>
      <button class="btn" onclick="location.reload()">Play again</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // window.WQ_SUPABASE_URL="https://zwdzvzvbotuuxxwtreqe.supabase.co"; window.WQ_SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZHp2enZib3R1dXh4d3RyZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODE4NDgsImV4cCI6MjA5NTc1Nzg0OH0.vdg0BnrsiWv8AnRsr-4323Gz5FKps5DoArvDJKeQAr8";
  window.WQ_DEMO=!(window.WQ_SUPABASE_URL&&window.WQ_SUPABASE_ANON);
</script>
<script src="wq-api.js"></script>
<script>
const $=s=>document.querySelector(s);
const el=h=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
function show(id){['join','pick','play','result'].forEach(x=>$('#'+x).classList.toggle('hide',x!==id));}
function lev(a,b){const m=a.length,n=b.length,d=[...Array(m+1)].map((_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
  d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}

/* ---------- state ---------- */
let ASSIGN=null, QS=[], CLASSES=[], MYCLASS=null, ME=null, SESSION=null;
let qi=0, pts=0, correct=0, qStart=0, BOTS=[];

/* ---------- DEMO data (mirrors teacher demo store) ---------- */
function demoFind(code){
  const d=JSON.parse(localStorage.getItem('wq_demo')||'{"classes":[],"roster":{},"assignments":[]}');
  const a=d.assignments.find(x=>x.join_code===code.toUpperCase());
  return {a,d};
}

/* ---------- join ---------- */
async function lookup(){
  const code=$('#code').value.trim().toUpperCase();
  if(code.length<5)return($('#join-msg').textContent='Enter the 5-letter code');
  if(window.WQ_DEMO){
    const {a,d}=demoFind(code);
    if(!a){$('#join-msg').textContent='No game found. (Demo: create one in the teacher page first.)';return;}
    ASSIGN=a; QS=a.questions; CLASSES=d.classes; ROSTER=d.roster;
    enterPick();return;
  }
  const {data:as}=await WQ_API.findAssignmentByCode(code);
  if(!as){$('#join-msg').textContent='No open game with that code.';return;}
  ASSIGN=as;
  const {data:qs}=await WQ_API.listQuestions(as.id,true);
  QS=(qs||[]).map(r=>({qtype:r.qtype,skill:r.skill,lo:r.lo,payload:r.payload}));
  const {data:cls}=await WQ_API.listAllClasses(); CLASSES=cls||[];
  enterPick();
}
let ROSTER={};
function enterPick(){
  show('pick');
  $('#pick-sub').textContent=ASSIGN.title+' · '+ASSIGN.category;
  $('#class-sel').innerHTML='<option value="">— select —</option>'+CLASSES.map(c=>`<option value="${c.id}">${c.crest_emoji||'🏫'} ${c.name}</option>`).join('');
}
async function loadNames(){
  const id=$('#class-sel').value; if(!id)return;
  MYCLASS=CLASSES.find(c=>c.id===id);
  if(ASSIGN.roster_only){
    let rows;
    if(window.WQ_DEMO)rows=ROSTER[id]||[];
    else{const {data}=await WQ_API.listRoster(id);rows=data||[];}
    $('#names-wrap').classList.remove('hide');$('#guest-wrap').classList.add('hide');
    $('#name-grid').innerHTML=rows.map(r=>`<div class="name-btn" onclick='pickName(${JSON.stringify(r).replace(/'/g,"&#39;")})'>${r.display_name}</div>`).join('')
      ||'<div class="muted">No names loaded for this class.</div>';
  }else{
    $('#guest-wrap').classList.remove('hide');$('#names-wrap').classList.add('hide');
  }
}
function pickName(r){ ME={roster_id:r.id,name:r.display_name}; begin(); }
function startGuest(){ const n=$('#guest-name').value.trim(); if(!n)return; ME={roster_id:null,name:n}; begin(); }

/* ---------- begin play ---------- */
async function begin(){
  if(!window.WQ_DEMO){
    const {data}=await WQ_API.startSession(ASSIGN.id,MYCLASS.id,ME.roster_id,ME.roster_id?null:ME.name);
    SESSION=data;
    // live leaderboard subscription
    WQ_API.subscribeLive(ASSIGN.id,refreshMiniLB);
  }
  spawnBots();
  show('play'); $('#player-name').textContent=ME.name;
  qi=0;pts=0;correct=0; render();
  refreshMiniLB();
}

/* difficulty-matched bots: accuracy scales to question mix */
function spawnBots(){
  const names=['RoboBot','WordBot','BrainyBot'];
  // estimate difficulty from question types (transform/cloze are harder)
  const hard=QS.filter(q=>q.qtype==='transform'||q.qtype==='cloze').length/Math.max(QS.length,1);
  const baseAcc=0.8-hard*0.35; // harder set -> bots score lower too
  BOTS=names.slice(0,2).map((n,i)=>({name:n,bot:true,pts:0,acc:Math.max(0.45,baseAcc-(i*0.08))}));
}

/* ---------- render question (shared types) ---------- */
function render(){
  if(qi>=QS.length)return finish();
  $('#prog').textContent=`${qi+1}/${QS.length}`;
  $('#pts').textContent=pts+' pts';
  const q=QS[qi], c=$('#qcard'), a=$('#actions'); c.innerHTML='';a.innerHTML='';
  qStart=Date.now();
  const P=q.payload;

  if(q.qtype==='mc'){
    c.appendChild(el(`<div class="qtext">${P.text}</div>`));
    P.options.forEach((o,idx)=>{
      const opt=el(`<div class="opt"><div class="key">${'ABCD'[idx]}</div><div>${o}</div></div>`);
      opt.onclick=()=>{ if(opt._l)return; c.querySelectorAll('.opt').forEach(x=>x._l=true);
        const ok=idx===P.answer; opt.classList.add(ok?'correct':'wrong');
        if(!ok)c.querySelectorAll('.opt')[P.answer].classList.add('correct'); score(ok,o);};
      c.appendChild(opt);
    });
  }
  else if(q.qtype==='fill'){
    c.appendChild(el(`<div class="qtext">${P.text.replace(/_{2,}/,'<input class="fill-in" id="fin" autocomplete="off">')}</div>`));
    const b=el(`<button class="btn">Check ✓</button>`); b.onclick=()=>{
      const v=$('#fin').value.trim().toLowerCase(); if(!v)return;
      const ok=(P.answer||[]).some(an=>an.toLowerCase()===v||(an.length>2&&lev(an.toLowerCase(),v)<=1));
      $('#fin').style.borderColor=ok?'var(--grass)':'var(--coral)'; b.disabled=true; score(ok,v);};
    a.appendChild(b); setTimeout(()=>$('#fin')&&$('#fin').focus(),80);
  }
  else if(q.qtype==='spell'){
    c.appendChild(el(`<div class="qtext">${P.text||'Spell the word'}</div>`));
    const play=el(`<button class="btn ghost" style="margin-bottom:10px">🔊 Hear word</button>`);
    play.onclick=()=>speak(P.audio||(P.answer||[''])[0]); c.appendChild(play);
    c.appendChild(el(`<input class="fill-in" id="fin" style="width:100%" autocomplete="off">`));
    const b=el(`<button class="btn">Check ✓</button>`); b.onclick=()=>{
      const v=$('#fin').value.trim().toLowerCase();const ok=(P.answer||[]).some(an=>an.toLowerCase()===v);
      b.disabled=true; score(ok,v);}; a.appendChild(b);
    setTimeout(()=>speak(P.audio||(P.answer||[''])[0]),300);
  }
  else if(q.qtype==='cloze'){
    let n=0; const html=P.passage.replace(/_\d+_/g,()=>`<input class="cloze-blank" data-b="${n++}" autocomplete="off">`);
    c.appendChild(el(`<div class="passage">${html}</div>`));
    const b=el(`<button class="btn">Check all ✓</button>`); b.onclick=()=>{
      let all=true; P.blanks.forEach((bl,bi)=>{const inp=c.querySelector(`[data-b="${bi}"]`);const v=inp.value.trim().toLowerCase();
        const ok=(bl.correct||[]).some(an=>an.toLowerCase()===v||(an.length>2&&lev(an.toLowerCase(),v)<=1));
        inp.classList.add(ok?'correct':'wrong'); if(!ok)all=false;});
      b.disabled=true; score(all,'cloze');}; a.appendChild(b);
  }
  else if(q.qtype==='transform'){
    c.appendChild(el(`<div class="qtext">${P.task||P.text}</div>`));
    c.appendChild(el(`<div class="passage">${(P.original||[]).map(o=>`<div>• ${o}</div>`).join('')}</div>`));
    c.appendChild(el(`<textarea class="ta" id="tin" rows="3" placeholder="Write your sentence..."></textarea>`));
    const b=el(`<button class="btn">Check ✓</button>`); b.onclick=()=>{
      const v=$('#tin').value.trim(); if(v.split(/\s+/).length<6)return;
      const kw=(P.rubric||'').match(/['"]([^'"]+)['"]/g)?.map(k=>k.replace(/['"]/g,'').toLowerCase())||[];
      const ok=(kw.length===0||kw.some(k=>v.toLowerCase().includes(k)))&&v.split(/\s+/).length>=8;
      b.disabled=true;$('#tin').disabled=true; score(ok,v);}; a.appendChild(b);
  }
}

function score(ok,ans){
  const ms=Date.now()-qStart;
  if(ok){correct++; pts+=10+Math.max(0,5-Math.floor(ms/1000));}
  $('#pts').textContent=pts+' pts';
  const fb=el(`<div class="feedback ${ok?'good':'info'}">${ok?'🎉 Correct!':'Keep going!'}${QS[qi].payload.explain?'<br><span style="font-weight:600;opacity:.8">'+QS[qi].payload.explain+'</span>':''}</div>`);
  $('#qcard').appendChild(fb);
  if(!window.WQ_DEMO&&SESSION)WQ_API.recordResponse(SESSION.id,QS[qi].id,String(ans),ok,ms);
  stepBots();
  const next=el(`<button class="btn sky" style="margin-top:10px">Next →</button>`);
  next.onclick=()=>{qi++;render();refreshMiniLB();}; $('#actions').appendChild(next);
}

/* bots answer each round based on their accuracy */
function stepBots(){ BOTS.forEach(b=>{ if(Math.random()<b.acc) b.pts+=10+Math.floor(Math.random()*4); }); }

function refreshMiniLB(){
  const rows=[{name:ME?ME.name:'You',pts,me:true},...BOTS.map(b=>({name:b.name,pts:b.pts,bot:true}))]
    .sort((a,b)=>b.pts-a.pts);
  $('#mini-lb').innerHTML=rows.map((r,i)=>`<div class="lb ${r.me?'me':''} ${r.bot?'bot':''}">
    <span style="width:18px;font-weight:800">${i+1}</span>
    <div class="av">${r.bot?'🤖':(r.name[0]||'?')}</div>
    <span style="flex:1">${r.name}</span><span>${r.pts}</span></div>`).join('');
}

/* ---------- finish ---------- */
async function finish(){
  const total=QS.length, sp=Math.round(correct/total*100);
  if(!window.WQ_DEMO&&SESSION)await WQ_API.finishSession(SESSION.id,sp,pts,correct,total);
  show('result');
  const pass=sp>=(ASSIGN.pass_mark||60);
  $('#res-emoji').textContent=pass?'🏆':'💪';
  $('#res-title').textContent=pass?'Mission Complete!':'Good effort!';
  $('#res-score').textContent=`${correct}/${total} correct · ${pts} points`;
  const rows=[{name:ME?ME.name:'You',pts,me:true},...BOTS.map(b=>({name:b.name,pts:b.pts,bot:true}))].sort((a,b)=>b.pts-a.pts);
  $('#res-lb').innerHTML=rows.map((r,i)=>`<div class="lb ${r.me?'me':''} ${r.bot?'bot':''}">
    <span style="width:18px;font-weight:800">${['🥇','🥈','🥉'][i]||i+1}</span>
    <div class="av">${r.bot?'🤖':(r.name[0]||'?')}</div>
    <span style="flex:1">${r.name}</span><span>${r.pts}</span></div>`).join('');
}

/* TTS for spelling */
function speak(t){ if(!window.speechSynthesis)return; const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.lang='en-GB';speechSynthesis.cancel();speechSynthesis.speak(u);}

/* uppercase code field */
$('#code').addEventListener('input',e=>e.target.value=e.target.value.toUpperCase());
</script>
</body>
</html>
