<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speaking Echoes — Reported Speech</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0F1A;--surface:#13162A;--surface2:#1A1F36;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#E8EAF6;--muted:rgba(232,234,246,0.45);--accent:#7C3AED;--accent2:#A78BFA;--teal:#34D399;--coral:#F87171;--radius:18px;--radius-sm:10px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(124,58,237,.12) 0%,transparent 60%)}
.wrap{max-width:680px;margin:0 auto;padding:20px 16px 56px;position:relative;z-index:1}
.hdr{text-align:center;padding:28px 0 20px}
.hdr-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:99px;padding:5px 14px;margin-bottom:14px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent2)}
.hdr-logo{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),#6D28D9);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:12px;box-shadow:0 8px 32px rgba(124,58,237,.35);animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
.hdr-title{font-family:'Instrument Serif',serif;font-size:clamp(26px,6vw,42px);font-weight:400;color:#fff;margin-bottom:8px}
.hdr-title span{color:var(--accent2);font-style:italic}
.hdr-sub{font-size:13px;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.rule-chip{display:inline-flex;align-items:center;gap:7px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:14px;line-height:1.5}
.source-box{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:16px}
.source-line{font-size:15px;line-height:1.7;color:var(--text);font-family:'Instrument Serif',serif;font-weight:500}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.progress-bar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s}
.progress-txt{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap}
.q-num{font-size:11px;font-weight:700;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.q-text{font-size:13px;color:var(--muted);margin-bottom:14px;font-weight:600}
.mcq-opts{display:flex;flex-direction:column;gap:8px}
.mcq-opt{background:var(--surface2);border:1.5px solid var(--border2);border-radius:11px;padding:12px 16px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;line-height:1.6}
.mcq-opt:hover{border-color:var(--accent);background:rgba(124,58,237,.1);color:#fff}
.mcq-opt.correct{border-color:var(--teal);background:rgba(52,211,153,.15);color:var(--teal)}
.mcq-opt.wrong{border-color:var(--coral);background:rgba(248,113,113,.12);color:var(--coral)}
.hint-box{display:none;margin-top:12px;padding:11px 14px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:10px;font-size:13px;color:#FBBF24;font-weight:600;line-height:1.5}
.hint-box.show{display:block}
.feedback{display:none;margin-top:12px;padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;align-items:center;gap:8px}
.feedback.show{display:flex}
.feedback.ok{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--teal)}
.feedback.bad{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--coral)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:11px;padding:12px 22px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-success{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 18px rgba(16,185,129,.4)}
.btn-success:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn-success:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text)}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.stat-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1;min-width:75px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;text-align:center}
.stat-val{font-family:'Instrument Serif',serif;font-size:26px;color:#fff}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.result-screen{display:none;text-align:center;padding:32px 0}
.result-screen.show{display:block}
.result-emoji{font-size:60px;margin-bottom:14px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.result-title{font-family:'Instrument Serif',serif;font-size:34px;color:#fff;margin-bottom:6px}
.result-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.submit-note{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:11px;padding:12px 16px;font-size:13px;color:var(--teal);font-weight:600;margin-bottom:16px;text-align:center}
.game-topbar{position:sticky;top:0;z-index:50;background:rgba(13,15,26,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.08);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.gtb-left{display:flex;align-items:center;gap:10px}
.gtb-title{font-family:'Instrument Serif',serif;font-size:16px;color:#fff}
.btn-island-return{display:inline-flex;align-items:center;gap:6px;background:rgba(0,212,190,.15);border:1px solid rgba(0,212,190,.35);color:#00d4be;font-size:12px;font-weight:800;border-radius:10px;padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-decoration:none}
.btn-island-return:hover{background:rgba(0,212,190,.25);color:#fff}
#heroBar{background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.1);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:relative;z-index:10}
.hero-badge{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:99px;padding:5px 14px;font-size:11px;font-weight:600;color:#34D399}
.hero-name{font-size:13px;font-weight:700;color:#E8EAF6}
.hero-cls{font-size:10px;color:rgba(232,234,246,0.45);font-weight:500;margin-top:1px}
.btn-back-island{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);font-size:11px;font-weight:700;border-radius:8px;padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-back-island:hover{background:rgba(255,255,255,.13);color:#fff}
.ws-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.ws-btn{background:var(--surface2);border:1.5px solid var(--border2);border-radius:11px;padding:16px;text-align:center;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit;font-size:14px}
.ws-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.ws-btn.active{border-color:var(--accent);background:rgba(124,58,237,.15);color:var(--accent2)}
</style>
</head>
<body>
<div id="heroBar"></div>
<div class="game-topbar">
  <div class="gtb-left">
    <span style="font-size:20px">🏝️</span>
    <span class="gtb-title">Cantonment Class Quest</span>
  </div>
  <button class="btn-island-return" onclick="goBack()">🏝️ Return to Island</button>
</div>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-badge">🗣️ Speaking Echoes</div>
    <div class="hdr-logo">💬</div>
    <h1 class="hdr-title">Reported <span>Speech</span></h1>
    <p class="hdr-sub">Transform direct speech into reported speech</p>
  </div>

  <div id="worksheetSelector" style="display:none">
    <p style="text-align:center;margin-bottom:14px;font-size:13px;color:var(--muted)">Choose a worksheet to begin:</p>
    <div class="ws-selector" id="wsSelectorGrid"></div>
  </div>

  <div class="card" id="quizCard" style="display:none">
    <div class="rule-chip" id="ruleChip">📌 Rule</div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
      <div class="progress-txt" id="progressTxt">1 / 5</div>
    </div>
    <div class="q-num" id="qNum">Question 1 of 5</div>
    <div class="source-box" id="sourceBox"></div>
    <div class="q-text">Choose the correct reported speech:</div>
    <div class="mcq-opts" id="mcqOpts"></div>
    <div class="hint-box" id="hintBox"></div>
    <div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="showHint()">💡 Hint</button>
      <button class="btn btn-ghost" onclick="goBack()">← Back</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">⭐</div>
    <div class="result-title" id="resultTitle">Well Done!</div>
    <div class="result-sub" id="resultSub"></div>
    <div class="stat-row" style="max-width:300px;margin:0 auto 16px">
      <div class="stat"><div class="stat-val" id="rScore">0</div><div class="stat-lbl">Correct</div></div>
      <div class="stat"><div class="stat-val" id="rStars">0</div><div class="stat-lbl">Stars</div></div>
      <div class="stat"><div class="stat-val" id="rPts">0</div><div class="stat-lbl">Points</div></div>
    </div>
    <div class="submit-note">✅ Done! Click below to save your score and continue.</div>
    <div class="btn-row" style="justify-content:center;flex-direction:column;align-items:center;gap:10px">
      <button class="btn btn-success" id="submitBtn" onclick="doSubmit()">📤 Submit & Continue</button>
      <button class="btn btn-ghost" onclick="backToSelector()">↩ Try Another Worksheet</button>
      <button class="btn btn-island-return" style="padding:12px 22px;font-size:14px" onclick="goBack()">🏝️ Back to Island</button>
    </div>
  </div>
</div>

<script src="supabase-games-client.js"></script>
<script>
const urlP=new URLSearchParams(location.search);
const _stored=(function(){try{return JSON.parse(sessionStorage.getItem('student')||'{}');}catch(e){return{};}})();
const hero={name:urlP.get('hero')||_stored.name||'',cls:urlP.get('cls')||_stored.cls||'',returnTo:urlP.get('returnTo')||'student-portal.html'};

(function(){
  const bar=document.getElementById('heroBar');if(!bar)return;
  if(hero.name){
    bar.innerHTML='<div class="hero-badge">✓ Logged in</div><div><div class="hero-name">'+hero.name+'</div><div class="hero-cls">'+hero.cls+'</div></div><div style="margin-left:auto;font-size:10px;color:rgba(232,234,246,.45);letter-spacing:.5px">Scores auto-save on completion</div><button class="btn-back-island" onclick="goBack()">← Island</button>';
  }else{
    bar.innerHTML='<div style="font-size:12px;color:#FBBF24;font-weight:700">⚠️ Not logged in — go back to the portal to log in first.</div><button class="btn-back-island" onclick="window.location.href=hero.returnTo">← Island</button>';
  }
})();

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const WORKSHEETS=[
  {name:'Worksheet 1',id:'ws1',qns:[
    {rule:'Statement to reported (present tense)',direct:'"I like ice cream," said James.',opts:['James said he likes ice cream.','James said he liked ice cream.','James said that he likes ice cream.','James said he is liking ice cream.'],answer:1,hint:'Past tense reporting verb (said) → use past tense in reported clause. "liked"'},
    {rule:'Question to reported',direct:'"Do you play football?" asked Emily.',opts:['Emily asked do you play football.','Emily asked if I played football.','Emily asked if you play football.','Emily asked whether do I play football.'],answer:1,hint:'Use "if/whether" to convert yes-no questions. Keep past tense.'},
    {rule:'Imperative to reported',direct:'"Please sit down," the teacher said.',opts:['The teacher said please sit down.','The teacher told him to sit down.','The teacher said him sit down.','The teacher said to sit down.'],answer:1,hint:'Imperatives use "tell + object + to-infinitive"'},
    {rule:'Statement (past tense)',direct:'"I have finished my homework," said Alex.',opts:['Alex said he finished his homework.','Alex said he had finished his homework.','Alex said he has finished his homework.','Alex said he finishes his homework.'],answer:1,hint:'Present perfect → past perfect (had + past participle)'},
    {rule:'Negative statement',direct:'"I don\'t want to go," she said.',opts:['She said she does not want to go.','She said she did not want to go.','She said she doesn\'t want to go.','She said she not want to go.'],answer:1,hint:'Keep the negative. Use past tense: "did not want"'}
  ]},
  {name:'Worksheet 2',id:'ws2',qns:[
    {rule:'He/she/it pronouns change',direct:'"I am happy," said Tom.',opts:['Tom said I am happy.','Tom said he is happy.','Tom said he was happy.','Tom said he am happy.'],answer:2,hint:'"I" becomes "he/she". Reporting verb is past, so "was happy"'},
    {rule:'Time expressions (today → that day)',direct:'"I will see you today," he said.',opts:['He said he will see me today.','He said he would see me that day.','He said he sees me today.','He said he will see me that day.'],answer:1,hint:'Replace "today" with "that day". Use "would" (future in past)'},
    {rule:'Place expressions (here → there)',direct:'"Meet me here," Lisa said.',opts:['Lisa said meet me here.','Lisa said to meet her there.','Lisa said meet her here.','Lisa said I meet her there.'],answer:1,hint:'Imperative: "tell + object + to-infinitive". Replace "here" with "there"'},
    {rule:'WH-question (what)',direct:'"What is your name?" he asked.',opts:['He asked what is your name.','He asked what my name is.','He asked what was my name.','He asked what my name was.'],answer:3,hint:'WH-questions keep the WH-word. Use past tense: "was my name"'},
    {rule:'Reported speech with "that"',direct:'"The film is interesting," she said.',opts:['She said the film is interesting.','She said that the film was interesting.','She said that the film is interesting.','She said the film interesting.'],answer:1,hint:'Use "that" after the reporting verb. Change tense: "was"'}
  ]},
  {name:'Worksheet 3',id:'ws3',qns:[
    {rule:'Modal verb (can → could)',direct:'"I can swim," he said.',opts:['He said he can swim.','He said he could swim.','He said he cans swim.','He said he is able swim.'],answer:1,hint:'Modal "can" becomes "could" in reported speech'},
    {rule:'Modal verb (will → would)',direct:'"I will help you," said Anna.',opts:['Anna said she will help me.','Anna said she would help me.','Anna said she helps me.','Anna said she will help you.'],answer:1,hint:'Modal "will" becomes "would" in reported speech'},
    {rule:'Two-part response',direct:'"Yes, I understand," Tom said.',opts:['Tom said yes, he understands.','Tom said yes, he understood.','Tom said he understood.','Tom said he yes understood.'],answer:2,hint:'Drop "Yes". Use past tense: "he understood"'},
    {rule:'Thought/belief (past continuous)',direct:'"I was sleeping," she said.',opts:['She said she was sleeping.','She said she had been sleeping.','She said she has been sleeping.','She said she sleeps.'],answer:1,hint:'Past continuous stays past continuous in reported speech.'},
    {rule:'Reported speech with "that"',direct:'"She is a doctor," he said.',opts:['He said she is a doctor.','He said that she is a doctor.','He said that she was a doctor.','He said she was is doctor.'],answer:2,hint:'Add "that". Change "is" to "was"'}
  ]},
  {name:'Worksheet 4',id:'ws4',qns:[
    {rule:'Mixed tenses (two clauses)',direct:'"I like cats and I want a pet," she said.',opts:['She said she likes cats and wants a pet.','She said she liked cats and wanted a pet.','She said she liked cats and wants a pet.','She said she like cats and want a pet.'],answer:1,hint:'Both verbs must be in past tense: "liked" and "wanted"'},
    {rule:'Question with "where"',direct:'"Where do you live?" asked Max.',opts:['Max asked where do you live.','Max asked where you live.','Max asked where you lived.','Max asked where do you lived.'],answer:2,hint:'WH-question: keep "where". Use past tense: "lived"'},
    {rule:'Exclamation to reported',direct:'"How beautiful!" she said.',opts:['She said how beautiful.','She said it was beautiful.','She said how it was beautiful.','She said that beautiful.'],answer:1,hint:'Exclamations can become statements or use "what a/how" structure'},
    {rule:'Negative question',direct:'"Don\'t you like pizza?" asked Sam.',opts:['Sam asked don\'t you like pizza.','Sam asked if I liked pizza.','Sam asked whether I don\'t like pizza.','Sam asked if you like pizza.'],answer:1,hint:'Negative yes-no question uses "if/whether". Keep negative idea: "didn\'t like"'},
    {rule:'Complex sentence',direct:'"I think that you are wrong," he said.',opts:['He said I think you are wrong.','He said he thought that I was wrong.','He said he thinks you are wrong.','He said he thought you are wrong.'],answer:1,hint:'Report the main verb: "thought". Change "are" to "was"'}
  ]},
  {name:'Worksheet 5',id:'ws5',qns:[
    {rule:'Reported speech with "told"',direct:'"Listen carefully," the coach said to us.',opts:['The coach said us listen carefully.','The coach told us to listen carefully.','The coach said listen carefully.','The coach told us listen carefully.'],answer:1,hint:'"tell + object + to-infinitive" for imperatives'},
    {rule:'Reported question (yes-no)',direct:'"Have you finished?" the teacher asked.',opts:['The teacher asked have you finished.','The teacher asked if you had finished.','The teacher asked if I had finished.','The teacher asked whether you finished.'],answer:2,hint:'Convert to "if/whether". Shift tense: "had finished"'},
    {rule:'Speech with three-word phrase',direct:'"I will come back tomorrow," she said.',opts:['She said she will come back tomorrow.','She said she would come back the next day.','She said she come back tomorrow.','She said she would come the next day.'],answer:1,hint:'"will" → "would". "tomorrow" → "the next day"'},
    {rule:'Negative conditional',direct:'"If you don\'t study, you will fail," said mum.',opts:['Mum said if you don\'t study, you will fail.','Mum said if I didn\'t study, I would fail.','Mum said if you don\'t study, you would fail.','Mum said if I study, I will fail.'],answer:1,hint:'Conditionals: "don\'t" → "didn\'t", "will" → "would"'},
    {rule:'Reported speech (must)',direct:'"You must finish by 5 pm," he said.',opts:['He said I must finish by 5 pm.','He said I had to finish by 5 pm.','He said I must to finish by 5 pm.','He said you must finish by 5 pm.'],answer:1,hint:'"must" becomes "had to" in reported speech'}
  ]},
  {name:'Worksheet 6',id:'ws6',qns:[
    {rule:'Reported speech with "ask"',direct:'"Could you help me?" she asked.',opts:['She asked could you help her.','She asked if I could help her.','She asked could I help her.','She asked if you could help me.'],answer:1,hint:'"Could" becomes "could" (stays same). Change "you" to "I"'},
    {rule:'Statement with possession',direct:'"My sister is a teacher," he said.',opts:['He said my sister is a teacher.','He said his sister is a teacher.','He said his sister was a teacher.','He said my sister was a teacher.'],answer:2,hint:'"My" changes to "his". Change "is" to "was"'},
    {rule:'Reported speech (can-could-past)',direct:'"I can\'t find my keys," Tom said.',opts:['Tom said he can\'t find his keys.','Tom said he couldn\'t find his keys.','Tom said he can not find his keys.','Tom said he not could find his keys.'],answer:1,hint:'"can\'t" becomes "couldn\'t". "my" becomes "his"'},
    {rule:'Question with "why"',direct:'"Why are you crying?" asked Lily.',opts:['Lily asked why are you crying.','Lily asked why you are crying.','Lily asked why you were crying.','Lily asked why you cry.'],answer:2,hint:'WH-question: keep "why". Use past: "were crying"'},
    {rule:'Double reporting',direct:'"She said she likes pizza," Tom told us.',opts:['Tom said she likes pizza.','Tom said that she liked pizza.','Tom said she said she likes pizza.','Tom told us that she liked pizza.'],answer:3,hint:'Report the inner speech: "she liked pizza". Include "that"'}
  ]}
];

let ws=null,qi=0,score=0,answered=false,submitted=false;

function initSelector(){
  document.getElementById('worksheetSelector').style.display='block';
  document.getElementById('quizCard').style.display='none';
  document.getElementById('resultScreen').classList.remove('show');
  const grid=document.getElementById('wsSelectorGrid');
  grid.innerHTML=WORKSHEETS.map((w,i)=>'<button class="ws-btn" onclick="startWorksheet('+i+')">'+w.name+'<br><span style="font-size:11px;opacity:.6">5 questions</span></button>').join('');
}

function startWorksheet(i){
  ws=WORKSHEETS[i];
  qi=0;score=0;answered=false;
  document.getElementById('worksheetSelector').style.display='none';
  document.getElementById('quizCard').style.display='block';
  renderQ();
}

function renderQ(){
  const q=ws.qns[qi];
  document.getElementById('progressFill').style.width=((qi+1)/ws.qns.length*100)+'%';
  document.getElementById('progressTxt').textContent=(qi+1)+' / '+ws.qns.length;
  document.getElementById('qNum').textContent='Question '+(qi+1)+' of '+ws.qns.length;
  document.getElementById('ruleChip').textContent='📌 '+q.rule;
  document.getElementById('hintBox').className='hint-box';
  document.getElementById('feedback').className='feedback';
  answered=false;
  document.getElementById('sourceBox').innerHTML='<div class="source-line">'+q.direct+'</div>';
  document.getElementById('mcqOpts').innerHTML=q.opts.map((o,i)=>'<button class="mcq-opt" onclick="pickOpt('+i+',this)">'+String.fromCharCode(65+i)+'. '+o+'</button>').join('');
}

function pickOpt(i,btn){
  if(answered)return;
  answered=true;
  const q=ws.qns[qi];
  document.querySelectorAll('.mcq-opt').forEach(function(o){o.style.pointerEvents='none';});
  if(i===q.answer){
    score++;btn.classList.add('correct');
    var fb=document.getElementById('feedback');fb.className='feedback show ok';fb.textContent='✅ Correct!';
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.mcq-opt')[q.answer].classList.add('correct');
    var fb=document.getElementById('feedback');fb.className='feedback show bad';
    fb.textContent='❌ Not quite. The correct answer is highlighted.';
  }
  setTimeout(function(){if(qi<ws.qns.length-1){qi++;renderQ();}else showResult();},1500);
}

function showHint(){
  var h=document.getElementById('hintBox');
  h.textContent='💡 '+ws.qns[qi].hint;
  h.classList.add('show');
}

function showResult(){
  var total=ws.qns.length,pct=Math.round(score/total*100);
  var stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  document.getElementById('quizCard').style.display='none';
  document.getElementById('resultScreen').classList.add('show');
  document.getElementById('resultEmoji').textContent=stars===3?'🏆':stars===2?'🌟':stars===1?'⭐':'💪';
  document.getElementById('resultTitle').textContent=stars===3?'Perfect!':stars===2?'Great Work!':stars===1?'Good Try!':'Keep Practising!';
  document.getElementById('resultSub').textContent='You got '+score+'/'+total+' correct in '+ws.name;
  document.getElementById('rScore').textContent=score;
  document.getElementById('rStars').textContent=stars;
  document.getElementById('rPts').textContent='+'+(score*10);
}

async function doSubmit(){
  if(submitted)return;
  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='⏳ Submitting...';
  submitted=true;
  var total=ws.qns.length,pct=Math.round(score/total*100),stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  await supabase.saveScore({student_name:hero.name,class_name:hero.cls,zone:'rs',topic:'Reported Speech - '+ws.name,score:score,total:total,stars:stars});
  window.location.href=hero.returnTo+'?hero='+encodeURIComponent(hero.name)+'&cls='+encodeURIComponent(hero.cls)+'&zone=rs&score='+score+'&total='+total+'&stars='+stars;
}

function backToSelector(){document.getElementById('resultScreen').classList.remove('show');initSelector();}
function goBack(){window.location.href=hero.returnTo+'?hero='+encodeURIComponent(hero.name)+'&cls='+encodeURIComponent(hero.cls);}

initSelector();
</script>
</body>
</html>
