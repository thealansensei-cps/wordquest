<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WordQuest Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0F1A;--surface:#13162A;--surface2:#1A1F36;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#E8EAF6;--muted:rgba(232,234,246,0.45);--accent:#7C3AED;--accent2:#A78BFA;--teal:#34D399;--coral:#F87171;--radius:18px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(124,58,237,.12) 0%,transparent 60%)}
.wrap{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:1}
.hdr{text-align:center;padding:28px 0 32px}
.hdr-logo{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),#6D28D9);border-radius:24px;display:inline-flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:12px;box-shadow:0 8px 32px rgba(124,58,237,.35);animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
.hdr-title{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;color:#fff;margin-bottom:8px}
.hdr-title span{color:var(--accent2);font-style:italic}
.hdr-sub{font-size:13px;color:var(--muted)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.btn-back{background:rgba(0,212,190,.15);border:1px solid rgba(0,212,190,.35);color:#00d4be;font-size:12px;font-weight:800;border-radius:10px;padding:8px 16px;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-back:hover{background:rgba(0,212,190,.25);color:#fff}
.tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap}
.tab-btn{background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab-btn:hover{color:var(--accent2)}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}
.tab-content{display:none}
.tab-content.show{display:block}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:12px;text-align:left;font-weight:700;color:var(--accent2);border-bottom:1px solid var(--border)}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text)}
tr:hover{background:rgba(124,58,237,.05)}
.rank{font-weight:700;color:var(--accent);min-width:40px}
.medal{font-size:16px;margin-right:8px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.error{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--coral);padding:16px;border-radius:11px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-logo">🏆</div>
    <h1 class="hdr-title">Word<span>Quest</span></h1>
    <p class="hdr-sub">Leaderboards</p>
  </div>

  <div class="topbar">
    <a href="games-hub.html" class="btn-back">🏝️ Back to Games</a>
    <div style="font-size:12px;color:var(--muted)">Last updated: <span id="updateTime">loading...</span></div>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('students')">👥 Top Students</button>
    <button class="tab-btn" onclick="switchTab('games')">🎮 By Game</button>
    <button class="tab-btn" onclick="switchTab('classes')">🏠 By Class</button>
  </div>

  <!-- Tab 1: Top Students -->
  <div id="students" class="tab-content show">
    <div class="loading" id="studentsLoading">Loading leaderboard...</div>
    <div class="table-wrapper" id="studentsTable" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Student</th>
            <th>Class</th>
            <th>Total Score</th>
            <th>Games</th>
            <th>Accuracy</th>
            <th>⭐ Stars</th>
          </tr>
        </thead>
        <tbody id="studentsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 2: By Game -->
  <div id="games" class="tab-content">
    <div class="loading" id="gamesLoading">Loading game leaderboard...</div>
    <div class="table-wrapper" id="gamesTable" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Game</th>
            <th>Student</th>
            <th>Class</th>
            <th>Score</th>
            <th>Accuracy</th>
            <th>⭐ Stars</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="gamesBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 3: By Class -->
  <div id="classes" class="tab-content">
    <div class="loading" id="classesLoading">Loading class leaderboard...</div>
    <div class="table-wrapper" id="classesTable" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Class</th>
            <th>Student</th>
            <th>Total Score</th>
            <th>Games</th>
            <th>⭐ Stars</th>
          </tr>
        </thead>
        <tbody id="classesBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zwdzvzvbotuuxxwtreqe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZHp2enZib3R1dXh4d3RyZXFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODE4NDgsImV4cCI6MjA5NTc1Nzg0OH0.vdg0BnrsiWv8AnRsr-4323Gz5FKps5DoArvDJKeQAr8';

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('show');
  event.target.classList.add('active');
  
  if (tab === 'students') loadStudentsLeaderboard();
  if (tab === 'games') loadGamesLeaderboard();
  if (tab === 'classes') loadClassesLeaderboard();
}

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.style.display = 'block';
}

async function loadStudentsLeaderboard() {
  const loading = document.getElementById('studentsLoading');
  const table = document.getElementById('studentsTable');
  const body = document.getElementById('studentsBody');
  
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/legacy_scores?select=student_name,class_name,score,total,stars&order=score.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    
    // Aggregate by student
    const byStudent = {};
    rows.forEach(r => {
      if (!byStudent[r.student_name]) {
        byStudent[r.student_name] = {
          name: r.student_name,
          cls: r.class_name,
          score: 0,
          total: 0,
          games: 0,
          stars: 0
        };
      }
      byStudent[r.student_name].score += r.score;
      byStudent[r.student_name].total += r.total;
      byStudent[r.student_name].games += 1;
      byStudent[r.student_name].stars += r.stars;
    });
    
    const sorted = Object.values(byStudent).sort((a, b) => b.score - a.score);
    
    body.innerHTML = sorted.slice(0, 50).map((s, i) => `
      <tr>
        <td><span class="rank">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}</span></td>
        <td>${s.name}</td>
        <td>${s.cls}</td>
        <td><strong>${s.score}</strong></td>
        <td>${s.games}</td>
        <td>${Math.round(100 * s.score / s.total)}%</td>
        <td>${s.stars}</td>
      </tr>
    `).join('');
    
    loading.style.display = 'none';
    table.style.display = 'block';
    document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
  } catch (err) {
    showError('Error loading leaderboard: ' + err.message);
  }
}

async function loadGamesLeaderboard() {
  const loading = document.getElementById('gamesLoading');
  const table = document.getElementById('gamesTable');
  const body = document.getElementById('gamesBody');
  
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/legacy_scores?select=topic,zone,student_name,class_name,score,total,pct,stars,created_at&order=topic.asc,score.desc&limit=200`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    
    body.innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r.topic}</strong></td>
        <td>${r.student_name}</td>
        <td>${r.class_name}</td>
        <td>${r.score}/${r.total}</td>
        <td>${r.pct}%</td>
        <td>${r.stars}⭐</td>
        <td>${new Date(r.created_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
    
    loading.style.display = 'none';
    table.style.display = 'block';
  } catch (err) {
    showError('Error loading game leaderboard: ' + err.message);
  }
}

async function loadClassesLeaderboard() {
  const loading = document.getElementById('classesLoading');
  const table = document.getElementById('classesTable');
  const body = document.getElementById('classesBody');
  
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/legacy_scores?select=student_name,class_name,score,total,stars&order=class_name.asc,score.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    
    // Group by class
    const byClass = {};
    rows.forEach(r => {
      if (!byClass[r.class_name]) byClass[r.class_name] = [];
      const existing = byClass[r.class_name].find(x => x.name === r.student_name);
      if (existing) {
        existing.score += r.score;
        existing.games += 1;
        existing.stars += r.stars;
      } else {
        byClass[r.class_name].push({
          name: r.student_name,
          score: r.score,
          games: 1,
          stars: r.stars
        });
      }
    });
    
    let rank = 1;
    body.innerHTML = Object.entries(byClass).flatMap(([cls, students]) => {
      return students.sort((a, b) => b.score - a.score).map((s, i) => `
        <tr>
          <td><span class="rank">${rank++}</span></td>
          <td><strong>${cls}</strong></td>
          <td>${s.name}</td>
          <td>${s.score}</td>
          <td>${s.games}</td>
          <td>${s.stars}</td>
        </tr>
      `);
    }).join('');
    
    loading.style.display = 'none';
    table.style.display = 'block';
  } catch (err) {
    showError('Error loading class leaderboard: ' + err.message);
  }
}

// Load on page load
window.addEventListener('DOMContentLoaded', loadStudentsLeaderboard);
</script>
</body>
</html>
